<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="panel-container" id="panel">
        <strong>Feedback</strong>
        <div class="ratings-container">
            <div class="container">
                <div class="rating">
                    <div class="icon">😁</div>
                    <small>Neutral</small>
                </div>
                <div class="rating">
                    <div class="icon">😗</div>
                    <small>Happy</small>
                </div>
                <div class="rating">
                    <div class="icon">😥</div>
                    <small>Sad</small>
                </div>
                <div class="rating">
                    <div class="icon">🤩</div>
                    <small>satisfied</small>
                </div>
            </div>
            
        </div>
        <div class="btn" id="send">Send Feedback</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
